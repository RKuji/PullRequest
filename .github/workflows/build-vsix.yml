name: Release VSIX

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - solution: PullRequest.slnx
            manifest: PullRequest/source.extension.vsixmanifest

          - solution: PullRequest_VS2019.sln
            manifest: PullRequest_VS2019/source.extension.vsixmanifest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Update Version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")

          [xml]$manifest = Get-Content "${{ matrix.manifest }}"
          $manifest.PackageManifest.Metadata.Identity.Version = $version
          $manifest.Save("${{ matrix.manifest }}")

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ${{ matrix.solution }}

      - name: Build
        run: msbuild ${{ matrix.solution }} /p:Configuration=Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.solution }}
          path: |
            **/*.vsix

  release:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.vsix